<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: hsl(222, 47%, 11%);
            --bg-card: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: hsl(210, 40%, 98%);
            --text-secondary: hsl(215, 20%, 65%);
            --primary: hsl(263, 70%, 50%);
            --primary-hover: hsl(263, 70%, 45%);
            --accent-teal: hsl(171, 77%, 45%);
            --accent-orange: hsl(24, 95%, 55%);
            --danger: hsl(350, 80%, 55%);
            --success: hsl(142, 70%, 45%);
            --card-glow: rgba(99, 102, 241, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(263,70%,50%,0.15) 0, transparent 40%);
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 1100px;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            padding: 30px;
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .app-container {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 20px;
            }
        }

        /* Calendar Section */
        .calendar-section {
            display: flex;
            flex-direction: column;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .month-year-display {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            min-width: 130px;
            text-align: center;
            color: var(--text-primary);
        }

        .btn-nav {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .btn-today {
            background: var(--primary);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-right: 4px;
            font-family: inherit;
        }

        .btn-today:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 10px var(--card-glow);
        }

        .weekdays-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .day-cell {
            aspect-ratio: 1.1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 6px 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .day-cell:hover:not(.other-month) {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .day-cell.other-month {
            opacity: 0.25;
            cursor: default;
        }

        .day-cell.today {
            border: 1px solid var(--accent-teal);
            background: rgba(20, 184, 166, 0.06);
        }

        .day-cell.selected {
            background: linear-gradient(135deg, var(--primary) 0%, rgba(99, 102, 241, 0.4) 100%);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .day-number {
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 600;
        }

        .day-tasks-preview {
            display: flex;
            gap: 3px;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
            min-height: 6px;
        }

        .task-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: var(--accent-orange);
            transition: all 0.2s ease;
        }

        .task-dot.completed {
            background-color: var(--success);
        }

        /* Tasks Side Section */
        .tasks-section {
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-color);
            padding-left: 30px;
        }

        @media (max-width: 900px) {
            .tasks-section {
                border-left: none;
                padding-left: 0;
                padding-top: 25px;
                border-top: 1px solid var(--border-color);
            }
        }

        .panel-header {
            margin-bottom: 20px;
        }

        .panel-date {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .panel-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            max-height: 320px;
            padding-right: 5px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Scrollbar */
        .task-list::-webkit-scrollbar {
            width: 4px;
        }
        .task-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .task-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
        }
        .task-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        .empty-state {
            text-align: center;
            padding: 30px 15px;
            color: var(--text-secondary);
            font-size: 13px;
            border: 1px dashed rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            transition: all 0.2s ease;
            animation: fadeIn 0.25s ease;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-item-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .task-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .task-checkbox:checked {
            background: var(--success);
            border-color: var(--success);
        }

        .task-checkbox:checked::after {
            content: '✓';
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .task-text {
            font-size: 13.5px;
            line-height: 1.4;
            transition: all 0.2s ease;
            word-break: break-word;
        }

        .task-checkbox:checked + .task-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-delete:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .add-task-form {
            display: flex;
            gap: 8px;
        }

        .task-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: all 0.2s ease;
        }

        .task-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25);
        }

        .btn-add {
            background: var(--primary);
            border: none;
            color: white;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s ease;
            outline: none;
            white-space: nowrap;
        }

        .btn-add:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 8px var(--card-glow);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Calendar Main Section -->
        <div class="calendar-section">
            <div class="calendar-header">
                <h1>Calendar Tasks</h1>
                <div class="nav-controls">
                    <button class="btn-today" onclick="setToday()">Today</button>
                    <button class="btn-nav" onclick="changeMonth(-1)">‹</button>
                    <div class="month-year-display" id="monthYearDisplay">June 2026</div>
                    <button class="btn-nav" onclick="changeMonth(1)">›</button>
                </div>
            </div>

            <div class="weekdays-grid">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>

            <div class="days-grid" id="daysGrid">
                <!-- Day cells rendered dynamically -->
            </div>
        </div>

        <!-- Tasks Section -->
        <div class="tasks-section">
            <div class="panel-header">
                <h2 class="panel-date" id="selectedDateDisplay">Tuesday, June 30, 2026</h2>
                <p class="panel-subtitle" id="selectedDateSubtitle">No tasks for today</p>
            </div>

            <div class="task-list" id="taskList">
                <!-- Tasks list populated dynamically -->
            </div>

            <form class="add-task-form" id="addTaskForm">
                <input type="text" class="task-input" id="taskInput" placeholder="Add a task for this date..." required autocomplete="off">
                <button type="submit" class="btn-add">Add Task</button>
            </form>
        </div>
    </div>

    <script>
        // State
        let currentDate = new Date();
        let selectedDate = new Date();
        let tasks = {};

        // Helper to format date key as YYYY-MM-DD
        function formatDateKey(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // Initialize localStorage with dummy data if empty
        function initTasks() {
            const stored = localStorage.getItem('calendar-tasks');
            if (stored) {
                try {
                    tasks = JSON.parse(stored);
                } catch(e) {
                    tasks = {};
                }
            } else {
                // Populate default tasks relative to the current year/month
                const now = new Date();
                const y = now.getFullYear();
                const m = now.getMonth();
                
                const k1 = formatDateKey(new Date(y, m, 5));
                const k2 = formatDateKey(new Date(y, m, 12));
                const k3 = formatDateKey(new Date(y, m, 18));
                const k4 = formatDateKey(new Date(y, m, 22));

                tasks = {
                    [k1]: [{ id: 't1', title: 'Refactor database schema', completed: false }],
                    [k2]: [{ id: 't2', title: 'Update documentation for API', completed: true }],
                    [k3]: [{ id: 't3', title: 'Fix memory leak in auth module', completed: false }],
                    [k4]: [{ id: 't4', title: 'Setup CI/CD pipeline', completed: false }]
                };
                saveTasks();
            }
        }

        function saveTasks() {
            localStorage.setItem('calendar-tasks', JSON.stringify(tasks));
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            render();
        }

        function setToday() {
            currentDate = new Date();
            selectedDate = new Date();
            render();
        }

        function selectDate(year, month, dateNum) {
            selectedDate = new Date(year, month, dateNum);
            render();
        }

        function toggleTask(dateKey, taskId) {
            if (tasks[dateKey]) {
                const task = tasks[dateKey].find(t => t.id === taskId);
                if (task) {
                    task.completed = !task.completed;
                    saveTasks();
                    render();
                }
            }
        }

        function deleteTask(dateKey, taskId) {
            if (tasks[dateKey]) {
                tasks[dateKey] = tasks[dateKey].filter(t => t.id !== taskId);
                if (tasks[dateKey].length === 0) {
                    delete tasks[dateKey];
                }
                saveTasks();
                render();
            }
        }

        // Render functions
        function render() {
            renderCalendar();
            renderTasksPanel();
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // Display current Month and Year
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('monthYearDisplay').innerText = `${monthNames[month]} ${year}`;

            const daysGrid = document.getElementById('daysGrid');
            daysGrid.innerHTML = '';

            // First day of current month
            const firstDay = new Date(year, month, 1);
            // Day of week of the first day (0 = Sunday, ..., 6 = Saturday)
            const firstDayIndex = firstDay.getDay();

            // Last day of current month
            const lastDay = new Date(year, month + 1, 0);
            const totalDays = lastDay.getDate();

            // Last day of previous month
            const prevLastDay = new Date(year, month, 0).getDate();

            // Render trailing days of previous month
            for (let i = firstDayIndex; i > 0; i--) {
                const prevDate = new Date(year, month - 1, prevLastDay - i + 1);
                const cell = createDayCell(prevDate, true);
                daysGrid.appendChild(cell);
            }

            // Render current month days
            const today = new Date();
            const todayKey = formatDateKey(today);
            const selectedKey = formatDateKey(selectedDate);

            for (let d = 1; d <= totalDays; d++) {
                const date = new Date(year, month, d);
                const cell = createDayCell(date, false);
                daysGrid.appendChild(cell);
            }

            // Render leading days of next month to fill grid (usually up to 42 cells total)
            const totalCells = daysGrid.children.length;
            const remainingCells = 42 - totalCells;
            for (let i = 1; i <= remainingCells; i++) {
                const nextDate = new Date(year, month + 1, i);
                const cell = createDayCell(nextDate, true);
                daysGrid.appendChild(cell);
            }
        }

        function createDayCell(date, isOtherMonth) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            const dateNum = date.getDate();
            const year = date.getFullYear();
            const month = date.getMonth();
            const dateKey = formatDateKey(date);

            if (isOtherMonth) {
                cell.classList.add('other-month');
            } else {
                // Click handler
                cell.onclick = () => selectDate(year, month, dateNum);

                // Check today
                const today = new Date();
                if (formatDateKey(today) === dateKey) {
                    cell.classList.add('today');
                }

                // Check selected
                if (formatDateKey(selectedDate) === dateKey) {
                    cell.classList.add('selected');
                }

                // Add task preview dots
                const dayTasks = tasks[dateKey] || [];
                if (dayTasks.length > 0) {
                    const dotsContainer = document.createElement('div');
                    dotsContainer.className = 'day-tasks-preview';
                    
                    // Show at most 3 dots
                    dayTasks.slice(0, 3).forEach(task => {
                        const dot = document.createElement('span');
                        dot.className = 'task-dot';
                        if (task.completed) {
                            dot.classList.add('completed');
                        }
                        dotsContainer.appendChild(dot);
                    });

                    // If more than 3 tasks, add a tiny indicator or allow dots to wrap
                    if (dayTasks.length > 3) {
                        dotsContainer.style.gap = '2px';
                    }
                    cell.appendChild(dotsContainer);
                }
            }

            // Day number label
            const numLabel = document.createElement('span');
            numLabel.className = 'day-number';
            numLabel.innerText = dateNum;
            cell.insertBefore(numLabel, cell.firstChild);

            return cell;
        }

        function renderTasksPanel() {
            const dateKey = formatDateKey(selectedDate);
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = selectedDate.toLocaleDateString('en-US', options);
            
            document.getElementById('selectedDateDisplay').innerText = formattedDate;

            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';

            const dayTasks = tasks[dateKey] || [];
            const subtitle = document.getElementById('selectedDateSubtitle');
            
            if (dayTasks.length === 0) {
                subtitle.innerText = "No tasks for today";
                taskList.innerHTML = `
                    <div class="empty-state">
                        No tasks scheduled. Add a new task below to get started!
                    </div>
                `;
            } else {
                const total = dayTasks.length;
                const completed = dayTasks.filter(t => t.completed).length;
                subtitle.innerText = `${completed} of ${total} tasks completed`;

                dayTasks.forEach(task => {
                    const item = document.createElement('div');
                    item.className = 'task-item';
                    
                    item.innerHTML = `
                        <div class="task-item-left">
                            <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                            <span class="task-text">${escapeHtml(task.title)}</span>
                        </div>
                        <button class="btn-delete" title="Delete Task">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    `;

                    // Wire events
                    item.querySelector('.task-checkbox').addEventListener('change', () => toggleTask(dateKey, task.id));
                    item.querySelector('.btn-delete').addEventListener('click', () => deleteTask(dateKey, task.id));

                    taskList.appendChild(item);
                });
            }
        }

        // Form Submit handler
        document.getElementById('addTaskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const input = document.getElementById('taskInput');
            const title = input.value.trim();
            if (!title) return;

            const dateKey = formatDateKey(selectedDate);
            if (!tasks[dateKey]) {
                tasks[dateKey] = [];
            }

            const newTask = {
                id: 't_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                title: title,
                completed: false
            };

            tasks[dateKey].push(newTask);
            saveTasks();
            input.value = '';
            render();
        });

        // Helper to escape HTML characters
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        // Boot
        initTasks();
        render();
    </script>
</body>
</html>
